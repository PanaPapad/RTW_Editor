<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Rome Total War Building Editor</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <!-- CSS/JS -->
    <link rel="stylesheet" href="CSS/globals.css">
    <script src="JS/globals.js" defer></script>
    <script src="JS/buildings.js" defer></script>
</head>
<body>
    <div class="title-bar">
        <h1>Building Editor</h1>
    </div>
    <div class="row editor-settings">
        <div class="container-fluid editor-settings-tools">
            <input class="editor-settings-search-input" type="text" placeholder="Search" aria-label="Search">
            <button type="button" class="btn editor-settings-tools-button">Save</button>
            <button type="button" class="btn editor-settings-tools-button">Add</button>
            <button type="button" class="btn editor-settings-tools-button">Remove</button>
            <button type="button" class="btn editor-settings-tools-button">Other</button>
        </div>
    </div>
    <div class="container-fluid editor-canvas">
        <textarea title="editor-textarea" class="form-control editor-textarea" id="building-editor-textarea" rows="20">
        </textarea>
    </div>
</body>

</html>
